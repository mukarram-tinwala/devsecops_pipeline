name: CI/CD Pipeline

# 1. Trigger on pushes AND pull requests to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------
  # Job 1: The Gatekeeper (Tests)
  # ----------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Run Pytest
        run: pytest

  # ----------------------------------------
  # Job 2: The Factory (Docker Build)
  # ----------------------------------------
  build-image:
    # CRITICAL: This tells GitHub to wait for the tests to pass!
    needs: unit-tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Build Docker Image
        # This uses the multi-stage Dockerfile you wrote in Week 2!
        run: docker build -t my-production-app:latest .
        
      - name: Verify Image Exists
        run: docker images
